model:
  type: aeosformer
  time_embedding_dim: 64
  sensor_type_embedding_dim: 128
  tasks_data_embedding_dim: 128
  encoder_width: 512
  encoder_depth: 12
  encoder_num_heads: 16
  sensor_enabled_embedding_dim: 128
  constellation_data_embedding_dim: 128
  decoder_width: 512
  decoder_depth: 12
  decoder_num_heads: 16
  time_model_hidden_dim: 1024

initialization:
  actor_checkpoint: outputs/train_sl/paper_default_latest/checkpoints/iter_30000/model.pth

environment:
  split: train
  annotation_file: null
  limit: null
  num_envs: 1

reward:
  completion_bonus: 100.0
  visible_satellite_bonus: 2.0
  idle_satellite_penalty: 1.0
  scale: 10.0

ppo:
  total_timesteps: 100000
  n_steps: 20
  batch_size: 4
  n_epochs: 10
  learning_rate: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.0
  vf_coef: 0.5
  save_freq: 10000

iterative:
  outer_iterations: 2
  rollout_limit: null
  min_cr_improvement: 0.0

supervised:
  config: configs/train_sl/paper_default.yaml

validation_eval:
  enabled: false
  split: val_seen
  limit: 8
