model:
  type: aeosformer
  time_embedding_dim: 64
  sensor_type_embedding_dim: 128
  tasks_data_embedding_dim: 128
  encoder_width: 512
  encoder_depth: 12
  encoder_num_heads: 16
  sensor_enabled_embedding_dim: 128
  constellation_data_embedding_dim: 128
  decoder_width: 512
  decoder_depth: 12
  decoder_num_heads: 16
  time_model_hidden_dim: 1024

initialization:
  actor_checkpoint: data/model/model.pth

environment:
  split: train
  annotation_file: null
  limit: 1
  num_envs: 1
  # num_envs > 1 uses SubprocVecEnv with start_method="spawn" because Basilisk
  # is not safe to fork after its native modules are imported.

reward:
  completion_bonus: 100.0
  visible_satellite_bonus: 2.0
  # This is a constant per-satellite-per-step cost from the reference reward,
  # not a penalty applied only to idle satellites.
  satellite_existence_cost: 1.0
  scale: 10.0

ppo:
  total_timesteps: 20
  n_steps: 4
  batch_size: 4
  n_epochs: 1
  learning_rate: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.0
  vf_coef: 0.5
  save_freq: 10

iterative:
  outer_iterations: 1
  rollout_limit: 1
  min_cr_improvement: 0.0

supervised:
  config: configs/train_sl/tiny.yaml

validation_eval:
  enabled: false
  split: val_seen
  limit: 1

# RL keeps one fixed normalization statistics snapshot for the whole outer loop.
# Supervised retraining may recompute stats from the current selection manifest,
# but PPO training and rollout collection continue to use the initial snapshot.
