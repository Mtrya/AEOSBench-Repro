model:
  type: aeosformer
  time_embedding_dim: 64
  sensor_type_embedding_dim: 128
  tasks_data_embedding_dim: 128
  encoder_width: 512
  encoder_depth: 12
  encoder_num_heads: 16
  sensor_enabled_embedding_dim: 128
  constellation_data_embedding_dim: 128
  decoder_width: 512
  decoder_depth: 12
  decoder_num_heads: 16
  time_model_hidden_dim: 1024

initialization:
  checkpoint: null

data:
  split: train
  annotation_file: train.json
  epoch: null
  timesteps_per_scenario: 32
  limit: null
  statistics:
    mode: load_or_compute
    path: null

constraint_labels:
  min_positive_run_length: 3
  max_time_horizon: 100

loss_weights:
  feasibility: 1.0
  timing: 1.0
  assignment: 1.0

optimizer:
  type: adamw
  lr: 1.0e-4
  betas: [0.9, 0.98]
  weight_decay: 1.0e-4
  eps: 1.0e-8

scheduler:
  type: warmup_cosine
  warmup_iters: 10000
  warmup_start_factor: 1.0e-8
  cosine_eta_min: 5.0e-6

training:
  iterations: 90000
  # In the current trainer, scenarios_per_microstep is fixed at 1 and is not
  # yet configurable in YAML.
  # To match the paper's effective batch of 384 on one GPU:
  # 1 (GPU) x 1 (scenarios_per_microstep) x 12 (gradient_accumulation_steps) x
  # 32 (timesteps_per_scenario) = 384.
  gradient_accumulation_steps: 12
  num_workers: 2
  pin_memory: true
  autocast: true
  log_interval: 50
  checkpoint_interval: 5000
  validation_interval: 1000

validation:
  split: val_seen
  annotation_file: val_seen.json
  timesteps_per_scenario: 48
  max_scenarios: 64
  enabled: true
