model:
  type: aeosformer
  time_embedding_dim: 64
  sensor_type_embedding_dim: 128
  tasks_data_embedding_dim: 128
  encoder_width: 512
  encoder_depth: 12
  encoder_num_heads: 16
  sensor_enabled_embedding_dim: 128
  constellation_data_embedding_dim: 128
  decoder_width: 512
  decoder_depth: 12
  decoder_num_heads: 16
  time_model_hidden_dim: 1024

# The paper reports 3 stages of supervised learning, each 30000 iterations
# (90000 total). Each stage uses trajectories from a single epoch of collected
# data. To reproduce this:
#   Stage 1: set data.epoch to 1 and run for 30000 iterations.
#   Stage 2: set data.epoch to 2 and resume from the stage 1 checkpoint
#             (--resume <work-dir>/checkpoints/iter_030000.pt).
#   Stage 3: set data.epoch to 3 and resume from the stage 2 checkpoint.
# Setting data.epoch to null uses all epochs mixed together.
data:
  split: train
  annotation_file: train.json
  epoch: 1
  timesteps_per_scenario: 48
  limit: null
  statistics:
    mode: load_or_compute
    path: null

constraint_labels:
  min_positive_run_length: 3
  max_time_horizon: 100

# The paper (Sec. 5.1) explicitly states w_s = w_t = w_a = 1 for the joint
# loss L = w_s*L_s + w_t*L_t + w_a*L_a (Eq. 9).
# Note: the official implementation diverges by training two separate models
# (assignment and time) with an implicit 2x weight on the BCE feasibility
# term. We follow the paper's joint-training approach with equal weights.
loss_weights:
  feasibility: 1.0
  timing: 1.0
  assignment: 1.0

optimizer:
  type: adamw
  lr: 1.0e-4
  betas: [0.9, 0.98]
  weight_decay: 1.0e-4
  eps: 1.0e-8

scheduler:
  type: warmup_cosine
  warmup_iters: 10000
  warmup_start_factor: 1.0e-8
  cosine_eta_min: 5.0e-6

training:
  iterations: 30000
  # The paper reports training on 8 GPUs.
  # In the current trainer, scenarios_per_microstep is fixed at 1 and is not
  # yet configurable in YAML.
  # Effective batch = 8 (GPUs) x 1 (scenarios_per_microstep) x
  # 1 (gradient_accumulation_steps) x 48 (timesteps_per_scenario) = 384.
  gradient_accumulation_steps: 1
  num_workers: 2
  pin_memory: true
  autocast: true
  log_interval: 50
  checkpoint_interval: 5000
  validation_interval: 1000

validation:
  split: val_seen
  annotation_file: val_seen.json
  timesteps_per_scenario: 48
  max_scenarios: 64
  enabled: true
