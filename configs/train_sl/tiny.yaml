model:
  type: aeosformer
  time_embedding_dim: 16
  sensor_type_embedding_dim: 16
  tasks_data_embedding_dim: 16
  encoder_width: 64
  encoder_depth: 2
  encoder_num_heads: 4
  sensor_enabled_embedding_dim: 16
  constellation_data_embedding_dim: 16
  decoder_width: 64
  decoder_depth: 2
  decoder_num_heads: 4
  time_model_hidden_dim: 64

data:
  split: train
  annotation_file: train.json
  timesteps_per_sample: 8
  limit: 2
  statistics:
    mode: load_or_compute
    path: null

constraint_labels:
  min_positive_run_length: 3
  max_time_horizon: 100

optimizer:
  type: adamw
  lr: 1.0e-4
  betas: [0.9, 0.98]
  weight_decay: 1.0e-4
  eps: 1.0e-8

scheduler:
  type: warmup_cosine
  warmup_iters: 1
  warmup_start_factor: 1.0e-8
  cosine_eta_min: 5.0e-6

training:
  iterations: 1
  num_workers: 0
  pin_memory: false
  autocast: false
  log_interval: 1
  checkpoint_interval: 1
  validation_interval: 1

validation:
  split: val_seen
  annotation_file: val_seen.json
  timesteps_per_sample: 8
  max_scenarios: 1
  enabled: true
